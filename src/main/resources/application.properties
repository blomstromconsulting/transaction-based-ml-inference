quarkus.application.name=transaction-events
quarkus.http.port=8080
quarkus.jackson.property-naming-strategy=SNAKE_CASE

# Demo Redis settings. Quarkus uses quarkus.redis.hosts; fraud.redis.* is retained
# so the deployment config mirrors the architecture documentation.
fraud.redis.host=redis
fraud.redis.port=6379
quarkus.redis.hosts=redis://${fraud.redis.host}:${fraud.redis.port}

fraud.feast.url=http://feast-feature-server:6566
quarkus.rest-client.feast.url=${fraud.feast.url}

fraud.feature-writer.enabled=false
fraud.feature-writer.url=http://feast-feature-writer:8080
quarkus.rest-client.feature-writer.url=${fraud.feature-writer.url}

fraud.features.home-country=SE

fraud.offline-store.enabled=false
fraud.offline-store.jdbc-url=jdbc:postgresql://localhost:5432/fraud_features
fraud.offline-store.user=feast
fraud.offline-store.password=feast

quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=${fraud.offline-store.jdbc-url}
quarkus.datasource.username=${fraud.offline-store.user}
quarkus.datasource.password=${fraud.offline-store.password}
quarkus.flyway.migrate-at-start=${fraud.offline-store.enabled}
quarkus.flyway.baseline-on-migrate=true
quarkus.flyway.clean-disabled=true

fraud.model.MODEL_A.kserve-url=http://fraud-model-a.default/v1/models/fraud-model-a:predict
fraud.model.MODEL_A.feature-service=fraud_model_a_feature_service
fraud.model.MODEL_A.model-version=demo-a-v1

fraud.model.MODEL_B.kserve-url=http://fraud-model-b.default/v1/models/fraud-model-b:predict
fraud.model.MODEL_B.feature-service=fraud_model_b_feature_service
fraud.model.MODEL_B.model-version=demo-b-v1

fraud.kserve.connect-timeout-ms=2000
fraud.kserve.read-timeout-ms=5000

quarkus.log.category."com.example.fraud".level=INFO
