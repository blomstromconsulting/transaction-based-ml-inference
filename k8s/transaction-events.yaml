apiVersion: apps/v1
kind: Deployment
metadata:
  name: transaction-events
spec:
  replicas: 1
  selector:
    matchLabels:
      app: transaction-events
  template:
    metadata:
      labels:
        app: transaction-events
    spec:
      containers:
        - name: transaction-events
          image: ghcr.io/example/transaction-events:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: FRAUD_REDIS_HOST
              value: redis
            - name: FRAUD_REDIS_PORT
              value: "6379"
            - name: FRAUD_FEAST_URL
              value: http://feast-feature-server:6566
            - name: FRAUD_FEATURES_MERCHANT_VISIT_WINDOW_DAYS
              value: "30"
            - name: FRAUD_OFFLINE_STORE_ENABLED
              value: "true"
            - name: FRAUD_OFFLINE_STORE_JDBC_URL
              value: jdbc:postgresql://fraud-postgres:5432/fraud_features
            - name: FRAUD_OFFLINE_STORE_USER
              value: feast
            - name: FRAUD_OFFLINE_STORE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: fraud-postgres-credentials
                  key: password
            - name: QUARKUS_DATASOURCE_JDBC_URL
              value: jdbc:postgresql://fraud-postgres:5432/fraud_features
            - name: QUARKUS_DATASOURCE_USERNAME
              value: feast
            - name: QUARKUS_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: fraud-postgres-credentials
                  key: password
            - name: QUARKUS_FLYWAY_MIGRATE_AT_START
              value: "true"
            - name: QUARKUS_FLYWAY_BASELINE_ON_MIGRATE
              value: "true"
            - name: QUARKUS_FLYWAY_CLEAN_DISABLED
              value: "true"
            - name: FRAUD_MODEL_MODEL_A_KSERVE_URL
              valueFrom:
                configMapKeyRef:
                  name: fraud-model-feature-config
                  key: fraud.model.MODEL_A.kserve-url
            - name: FRAUD_MODEL_MODEL_A_FEATURE_SERVICE
              valueFrom:
                configMapKeyRef:
                  name: fraud-model-feature-config
                  key: fraud.model.MODEL_A.feature-service
            - name: FRAUD_MODEL_MODEL_A_MODEL_VERSION
              valueFrom:
                configMapKeyRef:
                  name: fraud-model-feature-config
                  key: fraud.model.MODEL_A.model-version
            - name: FRAUD_MODEL_MODEL_B_KSERVE_URL
              valueFrom:
                configMapKeyRef:
                  name: fraud-model-feature-config
                  key: fraud.model.MODEL_B.kserve-url
            - name: FRAUD_MODEL_MODEL_B_FEATURE_SERVICE
              valueFrom:
                configMapKeyRef:
                  name: fraud-model-feature-config
                  key: fraud.model.MODEL_B.feature-service
            - name: FRAUD_MODEL_MODEL_B_MODEL_VERSION
              valueFrom:
                configMapKeyRef:
                  name: fraud-model-feature-config
                  key: fraud.model.MODEL_B.model-version
---
apiVersion: v1
kind: Service
metadata:
  name: transaction-events
spec:
  selector:
    app: transaction-events
  ports:
    - name: http
      port: 8080
      targetPort: 8080
