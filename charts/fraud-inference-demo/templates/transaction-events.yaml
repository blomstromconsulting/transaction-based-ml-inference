{{- if .Values.transactionEvents.enabled -}}
{{- $postgresSecretName := default (printf "%s-credentials" (include "fraud-inference-demo.postgresName" .)) .Values.postgres.existingSecret -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "fraud-inference-demo.fullname" . }}-transaction-events
  labels:
    {{- include "fraud-inference-demo.labels" . | nindent 4 }}
    app.kubernetes.io/component: transaction-events
spec:
  replicas: {{ .Values.transactionEvents.replicaCount }}
  selector:
    matchLabels:
      {{- include "fraud-inference-demo.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: transaction-events
  template:
    metadata:
      labels:
        {{- include "fraud-inference-demo.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: transaction-events
      {{- with .Values.transactionEvents.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "fraud-inference-demo.serviceAccountName" . }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.postgres.enabled }}
      initContainers:
        - name: wait-for-postgres
          image: "{{ .Values.postgres.image.repository }}:{{ .Values.postgres.image.tag }}"
          imagePullPolicy: {{ .Values.postgres.image.pullPolicy }}
          command:
            - sh
            - -ec
            - |
              until pg_isready -h "$POSTGRES_HOST" -p "$POSTGRES_PORT" -U "$POSTGRES_USER" -d "$POSTGRES_DATABASE"; do
                echo "waiting for postgres at ${POSTGRES_HOST}:${POSTGRES_PORT}"
                sleep 2
              done
          env:
            - name: POSTGRES_HOST
              value: {{ include "fraud-inference-demo.postgresName" . | quote }}
            - name: POSTGRES_PORT
              value: {{ .Values.postgres.service.port | quote }}
            - name: POSTGRES_DATABASE
              value: {{ .Values.postgres.database | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.postgres.user | quote }}
      {{- end }}
      containers:
        - name: transaction-events
          image: "{{ .Values.transactionEvents.image.repository }}:{{ .Values.transactionEvents.image.tag }}"
          imagePullPolicy: {{ .Values.transactionEvents.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.transactionEvents.containerPort }}
          env:
            - name: FRAUD_REDIS_HOST
              value: {{ include "fraud-inference-demo.redisName" . | quote }}
            - name: FRAUD_REDIS_PORT
              value: {{ .Values.redis.service.port | quote }}
            - name: FRAUD_FEAST_URL
              value: {{ printf "http://%s:%v" (include "fraud-inference-demo.feastName" .) .Values.feast.service.port | quote }}
            - name: FRAUD_FEATURE_WRITER_ENABLED
              value: {{ .Values.featureWriter.enabled | quote }}
            - name: FRAUD_FEATURE_WRITER_URL
              value: {{ printf "http://%s:%v" (include "fraud-inference-demo.featureWriterName" .) .Values.featureWriter.service.port | quote }}
            - name: FRAUD_OFFLINE_STORE_ENABLED
              value: {{ .Values.postgres.enabled | quote }}
            - name: FRAUD_OFFLINE_STORE_JDBC_URL
              value: {{ printf "jdbc:postgresql://%s:%v/%s" (include "fraud-inference-demo.postgresName" .) .Values.postgres.service.port .Values.postgres.database | quote }}
            - name: FRAUD_OFFLINE_STORE_USER
              value: {{ .Values.postgres.user | quote }}
            - name: FRAUD_OFFLINE_STORE_PASSWORD
              {{- if or .Values.postgres.enabled .Values.postgres.existingSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ $postgresSecretName }}
                  key: {{ .Values.postgres.passwordSecretKey }}
              {{- else }}
              value: {{ .Values.postgres.password | quote }}
              {{- end }}
            - name: QUARKUS_DATASOURCE_JDBC_URL
              value: {{ printf "jdbc:postgresql://%s:%v/%s" (include "fraud-inference-demo.postgresName" .) .Values.postgres.service.port .Values.postgres.database | quote }}
            - name: QUARKUS_DATASOURCE_USERNAME
              value: {{ .Values.postgres.user | quote }}
            - name: QUARKUS_DATASOURCE_PASSWORD
              {{- if or .Values.postgres.enabled .Values.postgres.existingSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ $postgresSecretName }}
                  key: {{ .Values.postgres.passwordSecretKey }}
              {{- else }}
              value: {{ .Values.postgres.password | quote }}
              {{- end }}
            - name: QUARKUS_FLYWAY_MIGRATE_AT_START
              value: {{ .Values.postgres.enabled | quote }}
            - name: QUARKUS_FLYWAY_BASELINE_ON_MIGRATE
              value: "true"
            - name: QUARKUS_FLYWAY_CLEAN_DISABLED
              value: "true"
{{- range $modelName, $model := .Values.models }}
            - name: FRAUD_MODEL_{{ $modelName }}_KSERVE_URL
              valueFrom:
                configMapKeyRef:
                  name: {{ include "fraud-inference-demo.configName" $ }}
                  key: fraud.model.{{ $modelName }}.kserve-url
            - name: FRAUD_MODEL_{{ $modelName }}_FEATURE_SERVICE
              valueFrom:
                configMapKeyRef:
                  name: {{ include "fraud-inference-demo.configName" $ }}
                  key: fraud.model.{{ $modelName }}.feature-service
            - name: FRAUD_MODEL_{{ $modelName }}_MODEL_VERSION
              valueFrom:
                configMapKeyRef:
                  name: {{ include "fraud-inference-demo.configName" $ }}
                  key: fraud.model.{{ $modelName }}.model-version
{{- end }}
          {{- with .Values.transactionEvents.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.transactionEvents.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.transactionEvents.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.transactionEvents.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "fraud-inference-demo.fullname" . }}-transaction-events
  labels:
    {{- include "fraud-inference-demo.labels" . | nindent 4 }}
    app.kubernetes.io/component: transaction-events
spec:
  type: {{ .Values.transactionEvents.service.type }}
  selector:
    {{- include "fraud-inference-demo.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: transaction-events
  ports:
    - name: http
      port: {{ .Values.transactionEvents.service.port }}
      targetPort: http
{{- end }}
