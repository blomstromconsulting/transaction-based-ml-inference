{{- if .Values.transactionEvents.enabled -}}
apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "fraud-inference-demo.fullname" . }}-test-connection"
  labels:
    {{- include "fraud-inference-demo.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  restartPolicy: Never
  containers:
    - name: wget
      image: busybox:1.36
      command:
        - wget
      args:
        - -qO-
        - "http://{{ include "fraud-inference-demo.fullname" . }}-transaction-events:{{ .Values.transactionEvents.service.port }}/q/openapi"
{{- end }}
