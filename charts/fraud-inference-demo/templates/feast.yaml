{{- if .Values.feast.enabled -}}
{{- $postgresSecretName := default (printf "%s-credentials" (include "fraud-inference-demo.postgresName" .)) .Values.postgres.existingSecret -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "fraud-inference-demo.feastName" . }}
  labels:
    {{- include "fraud-inference-demo.labels" . | nindent 4 }}
    app.kubernetes.io/component: feast-feature-server
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "fraud-inference-demo.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: feast-feature-server
  template:
    metadata:
      labels:
        {{- include "fraud-inference-demo.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: feast-feature-server
    spec:
      serviceAccountName: {{ include "fraud-inference-demo.serviceAccountName" . }}
      {{- if and .Values.postgres.enabled (eq .Values.feast.offlineStore.type "postgres") }}
      initContainers:
        - name: wait-for-flyway-schema
          image: "{{ .Values.postgres.image.repository }}:{{ .Values.postgres.image.tag }}"
          imagePullPolicy: {{ .Values.postgres.image.pullPolicy }}
          command:
            - sh
            - -ec
            - |
              until psql -h "$POSTGRES_HOST" -p "$POSTGRES_PORT" -U "$POSTGRES_USER" -d "$POSTGRES_DATABASE" -tAc "select exists (select 1 from information_schema.columns where table_schema = '${POSTGRES_SCHEMA}' and table_name = 'customer_transaction_stats' and column_name = 'current_merchant_visit_count_30d') and to_regclass('${POSTGRES_SCHEMA}.merchant_risk_features') is not null" | grep -q t; do
                echo "waiting for Flyway-created feature tables"
                sleep 2
              done
          env:
            - name: POSTGRES_HOST
              value: {{ include "fraud-inference-demo.postgresName" . | quote }}
            - name: POSTGRES_PORT
              value: {{ .Values.postgres.service.port | quote }}
            - name: POSTGRES_DATABASE
              value: {{ .Values.postgres.database | quote }}
            - name: POSTGRES_SCHEMA
              value: {{ .Values.postgres.schema | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.postgres.user | quote }}
            - name: PGPASSWORD
              {{- if or .Values.postgres.enabled .Values.postgres.existingSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ $postgresSecretName }}
                  key: {{ .Values.postgres.passwordSecretKey }}
              {{- else }}
              value: {{ .Values.postgres.password | quote }}
              {{- end }}
      {{- end }}
      containers:
        - name: feast
          image: "{{ .Values.feast.image.repository }}:{{ .Values.feast.image.tag }}"
          imagePullPolicy: {{ .Values.feast.image.pullPolicy }}
          command:
            {{- toYaml .Values.feast.command | nindent 12 }}
          args:
            {{- toYaml .Values.feast.args | nindent 12 }}
          workingDir: {{ .Values.feast.workingDir }}
          ports:
            - name: http
              containerPort: {{ .Values.feast.containerPort }}
          env:
            - name: REDIS_HOST
              value: {{ include "fraud-inference-demo.redisName" . | quote }}
            - name: FEAST_REDIS_CONNECTION_STRING
              value: {{ printf "%s:%v" (include "fraud-inference-demo.redisName" .) .Values.redis.service.port | quote }}
            - name: FEAST_OFFLINE_STORE_TYPE
              value: {{ .Values.feast.offlineStore.type | quote }}
            - name: FEAST_POSTGRES_HOST
              value: {{ include "fraud-inference-demo.postgresName" . | quote }}
            - name: FEAST_POSTGRES_PORT
              value: {{ .Values.postgres.service.port | quote }}
            - name: FEAST_POSTGRES_DATABASE
              value: {{ .Values.postgres.database | quote }}
            - name: FEAST_POSTGRES_SCHEMA
              value: {{ .Values.postgres.schema | quote }}
            - name: FEAST_POSTGRES_USER
              value: {{ .Values.postgres.user | quote }}
            - name: FEAST_POSTGRES_PASSWORD
              {{- if or .Values.postgres.enabled .Values.postgres.existingSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ $postgresSecretName }}
                  key: {{ .Values.postgres.passwordSecretKey }}
              {{- else }}
              value: {{ .Values.postgres.password | quote }}
              {{- end }}
            - name: FEAST_POSTGRES_SSLMODE
              value: {{ .Values.postgres.sslmode | quote }}
          {{- with .Values.feast.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "fraud-inference-demo.feastName" . }}
  labels:
    {{- include "fraud-inference-demo.labels" . | nindent 4 }}
    app.kubernetes.io/component: feast-feature-server
spec:
  selector:
    {{- include "fraud-inference-demo.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: feast-feature-server
  ports:
    - name: http
      port: {{ .Values.feast.service.port }}
      targetPort: http
{{- end }}
